<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>disinto-voice</title>
    <!--
      Voice UI (parent issue #651, this page implements #663).

      Vanilla page — no SPA build chain. Loads Silero VAD via the
      @ricky0123/vad-web bundle from a CDN; the page itself is gated
      behind the same Forgejo OAuth session cookie as /chat/* via
      Caddy's forward_auth, so an unauthenticated request to this URL
      is bounced to /chat/login before any of the script tags execute.

      Audio contract with the bridge:
        client → bridge: PCM16 mono 16kHz binary frames during a speech
                         turn, then a JSON {"type":"end_of_turn"} frame.
        bridge → client: PCM16 mono 24kHz binary frames (Gemini Live
                         output) plus JSON status frames.
    -->
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, sans-serif;
            background: #1a1a2e;
            color: #eaeaea;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            background: #16213e;
            padding: 1rem 2rem;
            border-bottom: 1px solid #0f3460;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        header h1 { font-size: 1.25rem; font-weight: 600; }
        header .links a {
            color: #eaeaea;
            opacity: 0.7;
            margin-left: 1rem;
            text-decoration: none;
            font-size: 0.875rem;
        }
        header .links a:hover { opacity: 1; }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 700px;
            margin: 0 auto;
            width: 100%;
            padding: 2rem 1rem;
        }

        /* Big state indicator */
        .state-card {
            background: #16213e;
            border-radius: 12px;
            padding: 2rem;
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .state-orb {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            margin: 0 auto 1.5rem;
            background: #0f3460;
            border: 4px solid #2a3a6e;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            transition: background 0.25s, border-color 0.25s, box-shadow 0.25s;
        }
        body[data-state="idle"] .state-orb { background: #0f3460; border-color: #2a3a6e; }
        body[data-state="connecting"] .state-orb {
            background: #2a3a6e;
            border-color: #4a5a8e;
            animation: pulse 1.4s ease-in-out infinite;
        }
        body[data-state="listening"] .state-orb {
            background: #1a4d3e;
            border-color: #2ea872;
            box-shadow: 0 0 24px rgba(46, 168, 114, 0.4);
        }
        body[data-state="speech"] .state-orb {
            background: #2ea872;
            border-color: #5ecf95;
            box-shadow: 0 0 36px rgba(94, 207, 149, 0.6);
        }
        body[data-state="thinking"] .state-orb {
            background: #4a3a8e;
            border-color: #7a5acf;
            animation: pulse 1.0s ease-in-out infinite;
        }
        body[data-state="speaking"] .state-orb {
            background: #e94560;
            border-color: #ff6a80;
            box-shadow: 0 0 36px rgba(233, 69, 96, 0.6);
        }
        body[data-state="error"] .state-orb { background: #5a1a1a; border-color: #8a3a3a; }

        @keyframes pulse {
            0%, 100% { transform: scale(1.0); opacity: 1.0; }
            50%      { transform: scale(1.05); opacity: 0.85; }
        }

        .state-label {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }
        .state-detail {
            font-size: 0.95rem;
            opacity: 0.7;
        }

        .controls {
            display: flex;
            gap: 0.75rem;
            justify-content: center;
            margin-bottom: 1.5rem;
        }
        button {
            background: #e94560;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover:not(:disabled) { background: #d63447; }
        button:disabled { background: #555; cursor: not-allowed; opacity: 0.6; }
        button.secondary { background: #0f3460; }
        button.secondary:hover:not(:disabled) { background: #1a4d8e; }

        .transcript {
            background: #16213e;
            border-radius: 8px;
            padding: 1rem;
            min-height: 120px;
            max-height: 320px;
            overflow-y: auto;
            font-size: 0.95rem;
            line-height: 1.5;
        }
        .transcript .empty {
            opacity: 0.5;
            font-style: italic;
            text-align: center;
            padding: 2rem 0;
        }
        .transcript-line {
            padding: 0.5rem 0;
            border-bottom: 1px solid #0f3460;
        }
        .transcript-line:last-child { border-bottom: none; }
        .transcript-line .ts {
            font-size: 0.75rem;
            opacity: 0.5;
            margin-right: 0.5rem;
        }
        .transcript-line.think { color: #b8a8e8; font-style: italic; }
        .transcript-line.error { color: #ff8a8a; }

        .info {
            margin-top: 1rem;
            text-align: center;
            font-size: 0.8rem;
            opacity: 0.5;
        }
        code {
            font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
            background: #0f3460;
            padding: 0.1rem 0.35rem;
            border-radius: 3px;
        }
    </style>
</head>
<body data-state="idle">
    <header>
        <h1>disinto-voice</h1>
        <div class="links">
            <a href="/chat/">chat &rarr;</a>
        </div>
    </header>
    <main>
        <div class="state-card">
            <div class="state-orb" id="state-orb">&#x1F3A4;</div>
            <div class="state-label" id="state-label">idle</div>
            <div class="state-detail" id="state-detail">click start to enable the microphone</div>
        </div>

        <div class="controls">
            <button id="start-btn">start</button>
            <button id="stop-btn" class="secondary" disabled>stop</button>
        </div>

        <div class="transcript" id="transcript">
            <div class="empty">transcript will appear here</div>
        </div>

        <div class="info">
            conversation: <code id="conv-id">(pending)</code>
        </div>
    </main>

    <!--
      ONNX Runtime Web + @ricky0123/vad-web — pinned versions.
      Loaded from jsdelivr because the page is gated behind forward_auth;
      no anonymous request reaches these script tags. If the operator
      prefers to host these locally, drop the bundles into
      docker/voice/ui/static/ and rewrite the src URLs — no other changes
      needed (see voice-client.js for the asset-path config).
    -->
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.14.0/dist/ort.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ricky0123/vad-web@0.0.19/dist/bundle.min.js"></script>
    <script src="/voice/static/voice-client.js?v=20260427-vad-pause"></script>
</body>
</html>
