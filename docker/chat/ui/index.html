<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disinto threads</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, sans-serif;
            background: #0d0d0d;
            color: #e0e0e0;
            min-height: 100vh;
        }

        /* ── Header ─────────────────────────────────────────── */
        header {
            background: #141414;
            border-bottom: 1px solid #2a2a2a;
            padding: 0.75rem 1.5rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        header .title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.35rem;
        }
        .state-strip {
            font-size: 0.8rem;
            color: #888;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .state-strip .count { color: #aaa; font-weight: 600; }
        .state-strip .worker { color: #6ecf6e; }

        /* ── Inbox panel ────────────────────────────────────── */
        #inbox-panel {
            max-width: 800px;
            margin: 0.75rem auto 0;
            padding: 0 1rem;
        }
        .inbox-toggle {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            padding: 0.5rem 1rem;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            color: #aaa;
            user-select: none;
            transition: border-color 0.15s;
        }
        .inbox-toggle:hover { border-color: #444; }
        .inbox-toggle .count { font-weight: 600; color: #ddd; }
        .inbox-toggle .chevron { transition: transform 0.2s; font-size: 0.75rem; }
        .inbox-toggle .chevron.open { transform: rotate(90deg); }
        .inbox-body {
            display: none;
            border: 1px solid #2a2a2a;
            border-top: none;
            border-radius: 0 0 8px 8px;
            background: #1a1a1a;
            max-height: 400px;
            overflow-y: auto;
        }
        .inbox-body.expanded { display: block; }
        .inbox-item {
            padding: 0.6rem 1rem;
            border-bottom: 1px solid #222;
        }
        .inbox-item:last-child { border-bottom: none; }
        .inbox-item-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.25rem;
        }
        .priority-badge {
            font-size: 0.65rem;
            font-weight: 700;
            padding: 0.1rem 0.4rem;
            border-radius: 4px;
            text-transform: uppercase;
            flex-shrink: 0;
        }
        .priority-badge.p0 { background: #3a1a1a; color: #e76e6e; }
        .priority-badge.p1 { background: #3a3a1a; color: #e7d86e; }
        .priority-badge.p2 { background: #2a2a2a; color: #999; }
        .inbox-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: #e0e0e0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }
        .inbox-summary {
            font-size: 0.78rem;
            color: #888;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 0.4rem;
        }
        .inbox-actions {
            display: flex;
            gap: 0.5rem;
        }
        .inbox-btn {
            font-size: 0.72rem;
            padding: 0.2rem 0.6rem;
            border: 1px solid #333;
            border-radius: 4px;
            background: transparent;
            color: #aaa;
            cursor: pointer;
            transition: all 0.15s;
        }
        .inbox-btn:hover { background: #2a2a2a; color: #ddd; }
        .inbox-btn:disabled { opacity: 0.4; cursor: default; }
        .inbox-empty {
            padding: 1rem;
            text-align: center;
            color: #555;
            font-size: 0.85rem;
        }

        /* ── Thread list ────────────────────────────────────── */
        #threads-list {
            max-width: 800px;
            margin: 1rem auto;
            padding: 0 1rem;
        }
        .thread-card {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            margin-bottom: 0.75rem;
            overflow: hidden;
            transition: border-color 0.15s;
        }
        .thread-card:hover { border-color: #444; }
        .thread-card.running { border-left: 3px solid #6ecf6e; }
        .thread-card.completed { border-left: 3px solid #6eafe7; }
        .thread-card.failed { border-left: 3px solid #e76e6e; }

        .card-header {
            padding: 0.75rem 1rem;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 0.75rem;
        }
        .number-badge {
            font-size: 0.75rem;
            font-weight: 700;
            color: #888;
            background: #232323;
            border-radius: 4px;
            padding: 0.1rem 0.45rem;
            min-width: 1.5rem;
            text-align: center;
            flex-shrink: 0;
        }
        .header-text {
            flex: 1;
            min-width: 0;
        }
        .card-header .query {
            font-size: 0.9rem;
            line-height: 1.4;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .slug {
            font-family: "SF Mono", "Fira Code", "Consolas", monospace;
            font-size: 0.7rem;
            color: #6eafe7;
            margin-top: 0.15rem;
        }
        .turns {
            font-size: 0.7rem;
            color: #888;
            margin-left: 0.4rem;
        }
        .card-meta {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex-shrink: 0;
        }
        .status-badge {
            font-size: 0.7rem;
            font-weight: 600;
            padding: 0.15rem 0.5rem;
            border-radius: 10px;
            text-transform: uppercase;
        }
        .status-badge.running { background: #1a3a1a; color: #6ecf6e; }
        .status-badge.completed { background: #1a2a3a; color: #6eafe7; }
        .status-badge.failed { background: #3a1a1a; color: #e76e6e; }
        .age {
            font-size: 0.7rem;
            color: #666;
        }

        /* ── Card body (live stream / result) ───────────────── */
        .card-body {
            display: none;
            border-top: 1px solid #222;
        }
        .card-body.expanded { display: block; }

        .live-stream {
            background: #0a0a0a;
            padding: 0.75rem 1rem;
            font-family: "SF Mono", "Fira Code", "Consolas", monospace;
            font-size: 0.78rem;
            line-height: 1.5;
            max-height: 240px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-word;
            color: #ccc;
        }

        .result-summary {
            padding: 0.75rem 1rem;
            cursor: pointer;
            font-size: 0.85rem;
            line-height: 1.5;
            color: #aaa;
        }
        .result-summary:hover { color: #ddd; }
        .result-summary .expand-hint {
            font-size: 0.7rem;
            color: #666;
            display: block;
            margin-top: 0.25rem;
        }
        .full-transcript {
            display: none;
            background: #0a0a0a;
            padding: 0.75rem 1rem;
            font-family: "SF Mono", "Fira Code", "Consolas", monospace;
            font-size: 0.75rem;
            line-height: 1.5;
            max-height: 400px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-word;
            color: #bbb;
            border-top: 1px solid #222;
        }
        .full-transcript.visible { display: block; }

        /* ── Empty state ────────────────────────────────────── */
        .empty-state {
            text-align: center;
            padding: 4rem 1rem;
            color: #555;
        }
        .empty-state p { margin-top: 0.5rem; font-size: 0.9rem; }

        /* ── Timestamps ─────────────────────────────────────── */
        .started {
            font-size: 0.7rem;
            color: #555;
            margin-top: 0.2rem;
        }
    </style>
</head>
<body>
    <header>
        <div class="title">Disinto threads</div>
        <div class="state-strip" id="state-strip">
            <span>Loading...</span>
        </div>
    </header>

    <!-- ── Inbox panel ──────────────────────────────────────── -->
    <div id="inbox-panel">
        <div class="inbox-toggle" id="inbox-toggle">
            <span>Inbox <span class="count" id="inbox-count">(0)</span></span>
            <span class="chevron" id="inbox-chevron">&#9654;</span>
        </div>
        <div class="inbox-body" id="inbox-body"></div>
    </div>

    <div id="threads-list">
        <div class="empty-state"><p>Loading threads...</p></div>
    </div>

    <script>
        // ── State ──────────────────────────────────────────────
        let threads = [];
        let wsMap = {}; // task-id -> WebSocket
        let inboxItems = [];
        let inboxExpanded = false;

        // ── DOM refs ───────────────────────────────────────────
        const threadsList = document.getElementById('threads-list');
        const stateStrip = document.getElementById('state-strip');
        const inboxPanel = document.getElementById('inbox-panel');
        const inboxToggle = document.getElementById('inbox-toggle');
        const inboxCount = document.getElementById('inbox-count');
        const inboxBody = document.getElementById('inbox-body');
        const inboxChevron = document.getElementById('inbox-chevron');

        // ── Factory state ──────────────────────────────────────
        async function loadFactoryState() {
            try {
                const res = await fetch('/factory-state');
                if (!res.ok) return;
                const state = await res.json();
                const parts = [];
                parts.push(`<span class="count">${state.backlog}</span> backlog`);
                parts.push(`<span class="count">${state.in_progress}</span> in-progress`);
                if (state.current_worker) {
                    parts.push(`<span class="worker">${state.current_worker}</span> working`);
                }
                stateStrip.innerHTML = parts.join(' &bull; ');
            } catch {
                // silent
            }
        }

        // ── Inbox panel ────────────────────────────────────────
        async function loadInbox() {
            try {
                const res = await fetch('/inbox');
                if (!res.ok) return;
                const data = await res.json();
                // Only render if list changed
                const ids = data.map(i => i.id);
                const oldIds = inboxItems.map(i => i.id);
                if (JSON.stringify(ids) === JSON.stringify(oldIds)) return;
                inboxItems = data;
                renderInbox();
            } catch {
                // silent
            }
        }

        function renderInbox() {
            const count = inboxItems.length;
            inboxCount.textContent = `(${count})`;

            if (count === 0) {
                inboxBody.innerHTML = '';
                inboxBody.classList.remove('expanded');
                inboxChevron.classList.remove('open');
                inboxExpanded = false;
                return;
            }

            const frag = document.createDocumentFragment();
            inboxItems.forEach(item => {
                frag.appendChild(buildInboxItem(item));
            });
            inboxBody.innerHTML = '';
            inboxBody.appendChild(frag);
        }

        function buildInboxItem(item) {
            const div = document.createElement('div');
            div.className = 'inbox-item';

            // Header row: priority badge + title
            const header = document.createElement('div');
            header.className = 'inbox-item-header';

            const badge = document.createElement('span');
            const prioClass = 'p' + (item.priority || 'P2').replace('P', '');
            badge.className = `priority-badge ${prioClass}`;
            badge.textContent = item.priority || 'P2';

            const title = document.createElement('span');
            title.className = 'inbox-title';
            title.textContent = item.title || item.id;
            title.title = item.title || '';

            header.appendChild(badge);
            header.appendChild(title);
            div.appendChild(header);

            // Summary
            if (item.summary) {
                const summary = document.createElement('div');
                summary.className = 'inbox-summary';
                summary.textContent = truncate(item.summary, 200);
                div.appendChild(summary);
            }

            // Actions
            const actions = document.createElement('div');
            actions.className = 'inbox-actions';

            const dismissBtn = document.createElement('button');
            dismissBtn.className = 'inbox-btn';
            dismissBtn.textContent = 'Dismiss';
            dismissBtn.addEventListener('click', () => handleInboxAck(item.id, 'dismiss', dismissBtn));

            const snoozeBtn = document.createElement('button');
            snoozeBtn.className = 'inbox-btn';
            snoozeBtn.textContent = 'Snooze';
            snoozeBtn.addEventListener('click', () => handleInboxAck(item.id, 'snooze', snoozeBtn));

            actions.appendChild(dismissBtn);
            actions.appendChild(snoozeBtn);
            div.appendChild(actions);

            return div;
        }

        async function handleInboxAck(itemId, action, btnEl) {
            // Disable button during request
            btnEl.disabled = true;
            btnEl.textContent = '...';

            try {
                const res = await fetch(`/inbox/${itemId}/ack`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: `action=${encodeURIComponent(action)}`,
                });
                if (res.ok) {
                    // Remove item from list immediately for responsiveness
                    const idx = inboxItems.findIndex(i => i.id === itemId);
                    if (idx !== -1) {
                        inboxItems.splice(idx, 1);
                        renderInbox();
                    }
                }
            } catch {
                // silent
            } finally {
                btnEl.disabled = false;
                btnEl.textContent = action === 'dismiss' ? 'Dismiss' : 'Snooze';
            }
        }

        // Toggle inbox panel open/closed
        inboxToggle.addEventListener('click', () => {
            inboxExpanded = !inboxExpanded;
            inboxBody.classList.toggle('expanded', inboxExpanded);
            inboxChevron.classList.toggle('open', inboxExpanded);
        });

        // ── Thread list ────────────────────────────────────────
        async function loadThreads() {
            try {
                const res = await fetch('/threads');
                if (!res.ok) return;
                const data = await res.json();
                // Only render if list changed (avoids full re-render)
                const ids = data.map(t => t.id);
                const oldIds = threads.map(t => t.id);
                if (JSON.stringify(ids) === JSON.stringify(oldIds)) return;
                threads = data;
                renderThreads();
            } catch {
                // silent
            }
        }

        function renderThreads() {
            if (threads.length === 0) {
                threadsList.innerHTML = '<div class="empty-state"><p>No threads yet. Delegate a task via tmux.</p></div>';
                return;
            }
            const frag = document.createDocumentFragment();
            threads.forEach(thread => {
                frag.appendChild(buildCard(thread));
            });
            threadsList.innerHTML = '';
            threadsList.appendChild(frag);
        }

        function buildCard(t) {
            const card = document.createElement('div');
            const status = (t.status || 'unknown').toLowerCase();
            card.className = `thread-card ${status}`;

            const header = document.createElement('div');
            header.className = 'card-header';

            // Number badge (top-left, prominent) — #791
            if (t.number !== undefined && t.number !== null) {
                const numBadge = document.createElement('div');
                numBadge.className = 'number-badge';
                numBadge.textContent = `#${t.number}`;
                header.appendChild(numBadge);
            }

            const headerText = document.createElement('div');
            headerText.className = 'header-text';

            const queryDiv = document.createElement('div');
            queryDiv.className = 'query';
            queryDiv.textContent = t.query || '(no query)';
            queryDiv.title = t.query || '';
            headerText.appendChild(queryDiv);

            // Slug + turn count under the query (#791)
            if (t.slug || t.turns) {
                const slugDiv = document.createElement('div');
                slugDiv.className = 'slug';
                if (t.slug) {
                    slugDiv.textContent = t.slug;
                }
                if (t.turns && t.turns > 0) {
                    const turnsSpan = document.createElement('span');
                    turnsSpan.className = 'turns';
                    turnsSpan.textContent =
                        `${t.turns} ${t.turns === 1 ? 'turn' : 'turns'}`;
                    slugDiv.appendChild(turnsSpan);
                }
                headerText.appendChild(slugDiv);
            }

            const metaDiv = document.createElement('div');
            metaDiv.className = 'card-meta';

            const badge = document.createElement('span');
            badge.className = `status-badge ${status}`;
            badge.textContent = status;

            const ageSpan = document.createElement('span');
            ageSpan.className = 'age';
            ageSpan.textContent = t.started ? timeAgo(t.started) : '';

            metaDiv.appendChild(badge);
            metaDiv.appendChild(ageSpan);

            header.appendChild(headerText);
            header.appendChild(metaDiv);

            // Started time (shown below query on hover or always for compact)
            const startedDiv = document.createElement('div');
            startedDiv.className = 'started';
            startedDiv.textContent = t.started ? `started ${t.started}` : '';
            header.appendChild(startedDiv);

            card.appendChild(header);

            // Body: live stream for running, result for completed/failed
            const body = document.createElement('div');
            body.className = 'card-body';

            if (status === 'running') {
                const streamDiv = document.createElement('div');
                streamDiv.className = 'live-stream';
                streamDiv.textContent = '(connecting...)';
                body.appendChild(streamDiv);
                connectStream(t.id, streamDiv);
            } else if (status === 'completed' || status === 'failed') {
                if (t.result_summary) {
                    const summaryDiv = document.createElement('div');
                    summaryDiv.className = 'result-summary';
                    summaryDiv.innerHTML = escapeHtml(truncate(t.result_summary, 300))
                        + `<span class="expand-hint">click to expand full transcript</span>`;
                    summaryDiv.addEventListener('click', () => {
                        const transcript = body.querySelector('.full-transcript');
                        if (!transcript) {
                            loadTranscript(t.id, body, summaryDiv);
                        } else {
                            transcript.classList.toggle('visible');
                        }
                    });
                    body.appendChild(summaryDiv);
                }
            }

            card.appendChild(body);

            // Click header to expand/collapse
            header.addEventListener('click', () => {
                body.classList.toggle('expanded');
            });

            return card;
        }

        // ── WebSocket stream for running threads ───────────────
        function connectStream(taskId, streamEl) {
            const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
            const host = location.host;
            const wsUrl = `${proto}//${host}/threads/${taskId}/stream`;

            let ws;
            try {
                ws = new WebSocket(wsUrl);
            } catch {
                streamEl.textContent = 'WebSocket unavailable';
                return;
            }

            ws.onopen = () => {
                streamEl.textContent = '';
            };

            ws.onmessage = (ev) => {
                const line = ev.data;
                // Parse stream-json line and extract text
                const text = extractTextFromStreamLine(line);
                if (text !== null) {
                    streamEl.textContent += text;
                    streamEl.scrollTop = streamEl.scrollHeight;
                }
            };

            ws.onerror = () => {
                streamEl.textContent += '\n[stream error]';
            };

            ws.onclose = () => {
                // Reconnect after a delay
                setTimeout(() => {
                    if (wsMap[taskId] === ws) {
                        connectStream(taskId, streamEl);
                    }
                }, 3000);
            };

            wsMap[taskId] = ws;
        }

        function extractTextFromStreamLine(line) {
            try {
                const obj = JSON.parse(line);
                // stream-json format: content_block_delta with text_delta
                if (obj.type === 'content_block_delta') {
                    const delta = obj.delta || {};
                    if (delta.type === 'text_delta') {
                        return delta.text || '';
                    }
                }
                // Fallback: raw text
                return line;
            } catch {
                return line;
            }
        }

        // ── Transcript loading ─────────────────────────────────
        async function loadTranscript(taskId, body, summaryDiv) {
            try {
                const res = await fetch(`/threads/${taskId}`);
                if (!res.ok) return;
                const data = await res.json();
                const transcript = document.createElement('div');
                transcript.className = 'full-transcript';

                // Show stream tail if available
                if (data._stream_tail && data._stream_tail.length > 0) {
                    const text = data._stream_tail.map(l => extractTextFromStreamLine(l)).join('');
                    transcript.textContent = text || '(empty stream)';
                } else {
                    transcript.textContent = '(no stream data)';
                }

                transcript.classList.add('visible');
                body.appendChild(transcript);
                summaryDiv.querySelector('.expand-hint').textContent = 'click to collapse';
            } catch {
                // silent
            }
        }

        // ── Helpers ────────────────────────────────────────────
        function escapeHtml(s) {
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML.replace(/\n/g, '<br>');
        }

        function truncate(s, n) {
            if (s.length <= n) return s;
            return s.slice(0, n) + '...';
        }

        function timeAgo(isoStr) {
            const then = new Date(isoStr).getTime();
            if (isNaN(then)) return '';
            const diff = Math.floor((Date.now() - then) / 1000);
            if (diff < 10) return 'just now';
            if (diff < 60) return diff + 's ago';
            const mins = Math.floor(diff / 60);
            if (mins < 60) return mins + 'm ago';
            const hrs = Math.floor(mins / 60);
            if (hrs < 24) return hrs + 'h ago';
            const days = Math.floor(hrs / 24);
            return days + 'd ago';
        }

        // ── Init ───────────────────────────────────────────────
        loadFactoryState();
        loadThreads();
        loadInbox();
        // Refresh factory state every 5s
        setInterval(loadFactoryState, 5000);
        // Refresh inbox every 5s (synced with factory-state)
        setInterval(loadInbox, 5000);
        // Refresh thread list every 10s (WS handles live for running)
        setInterval(loadThreads, 10000);
    </script>
</body>
</html>
