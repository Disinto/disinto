name: Bug Report
about: Something is broken or behaving incorrectly
labels:
  - bug-report
body:
  - type: textarea
    id: what
    attributes:
      label: What's broken
      description: What happens vs what should happen. Include error messages, logs, or screenshots.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug.
      placeholder: |
        1. Run `dev-poll.sh disinto.toml`
        2. See error: "..."
    validations:
      required: true
  - type: textarea
    id: affected-files
    attributes:
      label: Affected files
      description: Which source files need to change? Include test files that cover this area.
      placeholder: |
        - dev/dev-agent.sh
        - lib/agent-session.sh
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How do we know it's fixed?
      placeholder: |
        - [ ] Bug no longer reproduces with steps above
        - [ ] Regression test added
        - [ ] CI green
    validations:
      required: true
  - type: textarea
    id: deps
    attributes:
      label: Dependencies
      description: Issues that must be merged first. Leave empty if none.
      placeholder: "- #NNN (reason)"
  - type: textarea
    id: acceptance-test
    attributes:
      label: Acceptance test
      description: |
        Explicit shell commands (with expected output) that prove the fix works
        when run on the live box. Include the reproduction steps as the first
        command to confirm the bug no longer occurs.
        See docs/contributing/acceptance-tests.md for the convention.
      placeholder: |
        ```bash
        $ # Reproduction step — should no longer produce the error
        $ curl -sf http://localhost:3000/api/health | jq .status
        "ok"
        ```
    validations:
      required: true
