name: Bug Report
about: Something is broken or behaving incorrectly
labels:
  - bug-report
body:
  - type: textarea
    id: what
    attributes:
      label: What's broken
      description: What happens vs what should happen. Include error messages, logs, or screenshots.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug.
      placeholder: |
        1. Run `dev-poll.sh disinto.toml`
        2. See error: "..."
    validations:
      required: true
  - type: textarea
    id: affected-files
    attributes:
      label: Affected files
      description: Which source files need to change? Include test files that cover this area.
      placeholder: |
        - dev/dev-agent.sh
        - lib/agent-session.sh
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How do we know it's fixed?
      placeholder: |
        - [ ] Bug no longer reproduces with steps above
        - [ ] Regression test added
        - [ ] CI green
    validations:
      required: true
  - type: textarea
    id: deps
    attributes:
      label: Dependencies
      description: Issues that must be merged first. Leave empty if none.
      placeholder: "- #NNN (reason)"
  - type: textarea
    id: acceptance-test
    attributes:
      label: Acceptance test
      description: |
        Path to the bash file under `tests/acceptance/` that proves the fix.
        Add the file in the same PR; the first assertion must be the
        reproduction step (must no longer reproduce). Run on the live box
        via `tools/run-acceptance.sh <issue-number>`.
        See docs/contributing/acceptance-tests.md for the convention.
      placeholder: |
        `tests/acceptance/issue-<this-number>.sh` — runs via
        `tools/run-acceptance.sh <this-number>`.
    validations:
      required: true
