name: Refactor / Tech Debt
about: Code improvement without changing behavior
labels:
  - backlog
body:
  - type: textarea
    id: what
    attributes:
      label: What needs cleaning up
      description: Current state and why it's a problem.
    validations:
      required: true
  - type: textarea
    id: approach
    attributes:
      label: Approach
      description: How to fix it. Specifics matter — the dev-agent will follow this literally.
    validations:
      required: true
  - type: textarea
    id: affected-files
    attributes:
      label: Affected files
      description: Every file that will change. Include test files.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: |
        - [ ] Refactored code works identically (no behavior change)
        - [ ] Existing tests still pass
        - [ ] CI green
    validations:
      required: true
  - type: textarea
    id: deps
    attributes:
      label: Dependencies
      description: Issues that must be merged first. Leave empty if none.
      placeholder: "- #NNN (reason)"
  - type: textarea
    id: risks
    attributes:
      label: Risks
      description: What could break? Which e2e tests cover this area?
      placeholder: |
        - Phase handler changes could break dev/action/review lifecycle
        - ShellCheck may flag new patterns
  - type: textarea
    id: acceptance-test
    attributes:
      label: Acceptance test
      description: |
        Path to the bash file under `tests/acceptance/` that proves the
        refactor preserves behavior (or correctly changes it) on the live
        box. Include an assertion that exercises the unchanged behavior. Run
        via `tools/run-acceptance.sh <issue-number>`.
        See docs/contributing/acceptance-tests.md for the convention.
      placeholder: |
        `tests/acceptance/issue-<this-number>.sh` — runs via
        `tools/run-acceptance.sh <this-number>`.
    validations:
      required: true
