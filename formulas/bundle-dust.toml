# formulas/bundle-dust.toml — Bundle 3+ dust issues into one cleanup issue
#
# Consumed by gardener/gardener-step.sh when classify.sh emits
#   {"task":"bundle-dust","issue":0,"ctx":{"affected_paths":[N,...],"dust_group":"<group>","dust_issue_count":M}}
#
# Goal: bundle 3+ trivial single-line/comment/rename issues in the same
# subsystem into one cleanup backlog issue, close the sources, in a single
# small PR. Extracts dust-bundling from monolithic
# formulas/run-gardener.toml (Step 3 dust-bundling) into a focused per-bundle
# formula.
#
# Input: dust_group, affected_paths (array of issue nums), dust_issue_count
# from classify.sh. dust.jsonl already filtered by classify for >=3 distinct
# issues per group with 30d TTL pruning in classify.sh.
#
# On success: creates a bundle issue (backlog label), comments + closes each
# source issue, removes bundled entries from dust.jsonl, opens a small PR.
# On failure: leaves dust.jsonl intact (classify.sh will re-attempt next run).
#
# Idempotency: re-running with the same group is a no-op because classify.sh
# guards against re-triggering (entries removed after successful bundle).

name        = "bundle-dust"
description = "Bundle 3+ dust issues into one cleanup issue and close sources"
version     = 1

[[steps]]
id    = "bundle"
title = "Read dust.jsonl, create bundle issue, close sources, commit dust.jsonl change"
description = """
You are bundling a group of trivial dust issues into one cleanup backlog issue.
Do this in a single pass — no orchestration, no other tasks.

## 1. Extract classification context

Read the classification payload's `dust_group` and `affected_paths`:

  DUST_GROUP=$(printf '%s' "$TASK_JSON" | jq -r '.ctx.dust_group')
  AFFECTED_PATHS=$(printf '%s' "$TASK_JSON" | jq -c '.ctx.affected_paths')
  DUST_COUNT=$(printf '%s' "$TASK_JSON" | jq -r '.ctx.dust_issue_count')

## 2. Read matching entries from dust.jsonl

Filter gardener/dust.jsonl for entries matching the dust_group:

  DUST_FILE="gardener/dust.jsonl"

  # Extract matching lines into a scratch file
  jq -c --arg g "$DUST_GROUP" 'select(.group == $g)' "$DUST_FILE" \
    > /tmp/bundle-dust-group.jsonl

  # Count how many entries match
  GROUP_COUNT=$(wc -l < /tmp/bundle-dust-group.jsonl)

If GROUP_COUNT is 0, the group has no entries — this is unexpected. Log and exit.

## 3. Fetch each source issue

For each issue number in AFFECTED_PATHS, fetch the issue details:

  for issue_num in $(printf '%s' "$AFFECTED_PATHS" | jq -r '.[]'); do
    curl -sf -H "Authorization: token $FORGE_TOKEN" \\
      "$FORGE_API/issues/$issue_num" > "/tmp/dust-issue-${issue_num}.json"
  done

Save the titles and reasons from dust.jsonl alongside the issue numbers:

  # Build a combined lookup: issue_num -> title + reason
  jq -r '[.issue, .title, .reason] | @tsv' /tmp/bundle-dust-group.jsonl \\
    > /tmp/bundle-dust-lookup.tsv

This gives you a TSV file with columns: issue_num, title, reason.

## 4. Draft the bundle issue body

Create the bundle issue body with the following structure:

  cat > /tmp/bundle-dust-body.md <<'EOF'
  ## Bundled dust cleanup — <DUST_GROUP>

  Auto-bundled ${DUST_COUNT} trivial dust issues into one cleanup task.
  Each source issue is listed below and will be closed after bundling.

  ### Scope

  Subsystem/file: \`<DUST_GROUP>\`

  ### Checklist

  <per-source checklist items, one per bundled issue>

  ### Sources

  <per-source details for reference>

  ---
  Auto-generated by gardener bundle-dust formula.
  EOF

**Bundle issue title**: `fix: bundled dust cleanup — <DUST_GROUP>`

**Checklist section** (under `### Checklist`):
  For each entry in the dust group, add one checkbox:
    - [ ] #<issue_num> <title> — <reason>

  Example:
    - [ ] #123 fix trailing whitespace in env.sh — stray spaces on line 47
    - [ ] #124 rename deprecated_func to new_func — API migration
    - [ ] #125 remove dead import in runner.py — unused since commit abc123

**Sources section** (under `### Sources`):
  For each entry, add a collapsible detail:
    <details><summary>#<issue_num> — <title></summary>

    Reason: <reason>

    </details>

Token budget: ≤ 4K input (all source titles + reasons), ≤ 2K output (bundle body draft).

## 5. Create the bundle issue

POST a new issue with the bundled body:

  curl -sf -X POST -H "Authorization: token $FORGE_TOKEN" \\
    -H "Content-Type: application/json" \\
    -d '{"title":"fix: bundled dust cleanup — '"$DUST_GROUP"'","body":'\\
    '"$(cat /tmp/bundle-dust-body.md | jq -Rs '.')"}' \\
    "$FORGE_API/issues" > /tmp/bundle-dust-bundle.json

Extract the bundle issue number:
  BUNDLE_ISSUE=$(jq -r .number /tmp/bundle-dust-bundle.json)

Add the `backlog` label:
  gardener_add_label "$BUNDLE_ISSUE" backlog  || exit 1

## 6. Comment on and close each source issue

For each source issue in AFFECTED_PATHS:

  # Post a bundling comment
  cat > "/tmp/bundle-dust-comment-${issue_num}.md" <<EOF
  Bundled into #${BUNDLE_ISSUE} as part of a cleanup batch for \`${DUST_GROUP}\`.
  See #${BUNDLE_ISSUE} for the full checklist.
  EOF

  gardener_post_comment "$issue_num" "/tmp/bundle-dust-comment-${issue_num}.md"  || true

  # Close the source issue
  gardener_close_issue "$issue_num"  || true

## 7. Remove bundled entries from dust.jsonl

Remove all entries matching the dust_group from gardener/dust.jsonl:

  # Rebuild dust.jsonl without the group entries
  jq -c --arg g "$DUST_GROUP" 'select(.group != $g)' "$DUST_FILE" \\
    > /tmp/bundle-dust-dust-new.jsonl

  mv /tmp/bundle-dust-dust-new.jsonl "$DUST_FILE"

## 8. Open a small PR with the dust.jsonl change

Create the feature branch first, then commit and push:

  cd "$PROJECT_REPO_ROOT"
  BRANCH="chore/bundle-dust-${DUST_GROUP}-$(date +%Y%m%d)"
  git checkout -b "$BRANCH"
  git add gardener/dust.jsonl
  git commit -m "chore(gardener): remove bundled dust entries for ${DUST_GROUP} (#${BUNDLE_ISSUE})"
  git push origin "$BRANCH"

  # Create the PR
  curl -sf -X POST -H "Authorization: token $FORGE_TOKEN" \\
    -H "Content-Type: application/json" \\
    -d '{"title":"chore/bundle-dust-<'"$DUST_GROUP"'>("'"$BRANCH"'"),'\\
    '"\"head\":\"${BRANCH}\",\"base\":\"${PRIMARY_BRANCH}\",\"body\":\"'\\
    'Remove '"$GROUP_COUNT"' bundled dust entries for \\`$DUST_GROUP\\`.\\n'\\
    'Bundled into #'"$BUNDLE_ISSUE"'."}' \\
    "$FORGE_API/repos/$FORGE_REPO/pulls" > /tmp/bundle-dust-pr.json

## 9. Final log line

  echo "ACTION: bundled ${GROUP_COUNT} dust issues for '${DUST_GROUP}' into #${BUNDLE_ISSUE}"

Done. Stop the session.

## Output discipline

- No JSON-schema declarations, no regex backreferences in your reasoning —
  keep the structure plain prose + bash blocks (llama-friendly).
- One pass only. Do not loop, do not pick up a second group.
- Every repo edit goes through the five exported helpers
  (`gardener_edit_body`, `gardener_add_label`, `gardener_remove_label`,
  `gardener_post_comment`, `gardener_close_issue`) — never PATCH issues
  directly via curl, so the audit journal stays complete.
- The PR creation and dust.jsonl commit are the only git operations — keep the
  PR small and focused.
"""
